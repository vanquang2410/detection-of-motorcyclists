# Dev không có Claude Code local vẫn dùng được AI qua PR:
# comment "@claude <yêu cầu>" trên PR/issue, bot trả lời trong thread.
# VD: "@claude review lại theo docs/process/05-review-rules.md"
#     "@claude check DoD theo docs/process/06-definition-of-done.md"
#     "@claude giải thích vì sao rule 2.7 áp dụng ở đây"
name: claude-mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # user.type != 'Bot': chặn vòng lặp tự kích hoạt — comment của bot ai-review
    # (hoặc của chính bot này) có thể chứa chuỗi "@claude" khi trích lại tài liệu.
    if: contains(github.event.comment.body, '@claude') && github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr checks:*),Read,Grep,Glob"
